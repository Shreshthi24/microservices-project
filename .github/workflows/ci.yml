name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Auth Service
        run: |
          cd auth-service
          mvn clean install -DskipTests

      - name: Build Email Service
        run: |
          cd email-service
          mvn clean install -DskipTests

      - name: Build API Gateway
        run: |
          cd api-gateway
          mvn clean install -DskipTests